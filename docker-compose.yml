services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/
      DB_NAME: book_search_system
      JWT_SECRET: change-me
      BOOKS_PATH: backend/books
      INDEX_PATH: backend/data/search_index.pkl
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 5000
      SERVER_DEBUG: "false"
      TESSERACT_PATH: /usr/bin/tesseract
      PROCESS_CLEAR_EXISTING_DATA: "false"
      JOB_MAX_WORKERS: "2"
    volumes:
      - ./backend/books:/app/backend/books
      - ./backend/data:/app/backend/data
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:5000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
