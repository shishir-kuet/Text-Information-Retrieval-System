<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Search System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: .85rem; opacity: .6; margin-top: 3px; }
    #stats-bar {
      margin-left: auto;
      font-size: .78rem;
      opacity: .55;
      text-align: right;
      line-height: 1.6;
    }

    /* ── search box ── */
    .search-wrap {
      max-width: 780px;
      margin: 48px auto 0;
      padding: 0 16px;
    }
    .search-wrap h2 {
      font-size: 1.05rem;
      font-weight: 500;
      margin-bottom: 14px;
      color: #444;
    }
    .search-row {
      display: flex;
      gap: 10px;
    }
    #query-input {
      flex: 1;
      padding: 13px 16px;
      font-size: 1rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color .2s;
    }
    #query-input:focus { border-color: #4f46e5; }
    #search-btn {
      padding: 13px 26px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    #search-btn:hover { background: #4338ca; }
    #search-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* ── status / error ── */
    #status {
      max-width: 780px;
      margin: 16px auto 0;
      padding: 0 16px;
      font-size: .9rem;
      color: #666;
      min-height: 22px;
    }
    #status.error { color: #dc2626; }

    /* ── results ── */
    #results {
      max-width: 780px;
      margin: 24px auto 48px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .result-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid #4f46e5;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .card-rank {
      font-size: .75rem;
      font-weight: 700;
      color: #4f46e5;
      background: #eef2ff;
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
      margin-top: 2px;
    }
    .card-title { font-size: 1rem; font-weight: 600; flex: 1; }
    .card-meta {
      font-size: .8rem;
      color: #888;
      margin-bottom: 10px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .badge {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: .75rem;
      color: #555;
    }
    .card-preview {
      font-size: .88rem;
      color: #444;
      line-height: 1.6;
      border-top: 1px solid #f0f0f0;
      padding-top: 10px;
      white-space: pre-wrap;
    }
    .score-pill {
      font-size: .75rem;
      font-weight: 600;
      background: #dcfce7;
      color: #166534;
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📚 Book Search System</h1>
    <span>BM25 · Inverted Index · OCR-extracted text</span>
  </div>
  <div id="stats-bar">Loading stats…</div>
</header>

<div class="search-wrap">
  <h2>Enter a sentence or paragraph to find its source book and page</h2>
  <div class="search-row">
    <input id="query-input" type="text" placeholder="e.g. the causes of the French Revolution…" autocomplete="off" />
    <button id="search-btn">Search</button>
  </div>
</div>

<div id="status"></div>
<div id="results"></div>

<script>
  const API = 'http://localhost:5000/api';

  // ── load stats ────────────────────────────────────────────────────────────
  fetch(`${API}/stats`)
    .then(r => r.json())
    .then(d => {
      document.getElementById('stats-bar').innerHTML =
        `${d.total_books} books &nbsp;·&nbsp; ${d.total_pages_db.toLocaleString()} pages &nbsp;·&nbsp; ${d.unique_terms.toLocaleString()} index terms`;
    })
    .catch(() => {
      document.getElementById('stats-bar').textContent = 'API offline';
    });

  // ── search ────────────────────────────────────────────────────────────────
  const input  = document.getElementById('query-input');
  const btn    = document.getElementById('search-btn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  async function doSearch() {
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    btn.textContent = 'Searching…';
    status.className = '';
    status.textContent = '';
    results.innerHTML = '';

    try {
      const t0 = performance.now();
      const res = await fetch(`${API}/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      const ms = (performance.now() - t0).toFixed(0);

      if (!res.ok) {
        status.className = 'error';
        status.textContent = data.error || 'Search failed.';
        return;
      }

      if (data.total_results === 0) {
        status.textContent = 'No results found.';
        return;
      }

      status.textContent = `${data.total_results} result(s) for "${data.query}" — ${ms} ms`;
      results.innerHTML = data.results.map((r, i) => `
        <div class="result-card">
          <div class="card-header">
            <span class="card-rank">#${i + 1}</span>
            <span class="card-title">${escHtml(r.book_title)}</span>
            <span class="score-pill">score ${r.score}</span>
          </div>
          <div class="card-meta">
            <span class="badge">📄 PDF page ${r.page_number}</span>
            <span class="badge">🔖 Book page: ${escHtml(String(r.display_page_number))}</span>
            <span class="badge">🏷 ${escHtml(r.domain)}</span>
          </div>
          <div class="card-preview">${escHtml(r.preview)}</div>
        </div>
      `).join('');

    } catch (err) {
      status.className = 'error';
      status.textContent = 'Cannot reach API. Make sure the Flask server is running.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
